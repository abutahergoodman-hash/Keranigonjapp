<!DOCTYPE html>
<html lang="bn">
<head>
    <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
            <title>Field Force App - Dashboard</title>
                <!-- Tailwind CSS CDN -->
                    <script src="https://cdn.tailwindcss.com"></script>
                        <style>
                                .hidden { display: none !important; }
                                    </style>
                                    </head>
                                    <body class="bg-slate-100 min-h-screen flex items-center justify-center p-4 font-sans">

                                        <!-- LOGIN CARD (আইটেম #1: Create Login Layout) -->
                                            <div id="loginCard" class="bg-white p-8 rounded-2xl shadow-xl w-full max-w-md border border-slate-200">
                                                    <div class="text-center mb-8">
                                                                <h2 class="text-3xl font-extrabold text-slate-800">Staff Portal</h2>
                                                                            <p class="text-slate-500 mt-2 text-sm font-medium uppercase tracking-wider">Field Force Login</p>
                                                                                    </div>
                                                                                            
                                                                                                    <div class="space-y-4">
                                                                                                                <div>
                                                                                                                                <label class="block text-sm font-semibold text-slate-700 mb-1">User ID</label>
                                                                                                                                                <input type="text" id="uid" placeholder="user1" class="w-full p-3 border border-slate-300 rounded-lg focus:ring-2 focus:ring-indigo-500 outline-none transition">
                                                                                                                                                            </div>
                                                                                                                                                                        <div>
                                                                                                                                                                                        <label class="block text-sm font-semibold text-slate-700 mb-1">Password</label>
                                                                                                                                                                                                        <input type="password" id="pass" placeholder="••••••••" class="w-full p-3 border border-slate-300 rounded-lg focus:ring-2 focus:ring-indigo-500 outline-none transition">
                                                                                                                                                                                                                    </div>
                                                                                                                                                                                                                                <button onclick="handleLogin()" class="w-full bg-indigo-600 text-white p-3 rounded-lg font-bold text-lg hover:bg-indigo-700 active:scale-95 transition-all shadow-lg">লগইন করুন</button>
                                                                                                                                                                                                                                            <p id="errMsg" class="text-red-500 mt-3 text-center text-sm font-bold"></p>
                                                                                                                                                                                                                                                    </div>
                                                                                                                                                                                                                                                        </div>

                                                                                                                                                                                                                                                            <!-- DASHBOARD CARD (আইটেম #4: User Dashboard Layout) -->
                                                                                                                                                                                                                                                                <div id="dashboard" class="hidden bg-white p-6 rounded-2xl shadow-xl w-full max-w-lg border border-slate-200">
                                                                                                                                                                                                                                                                        <div class="flex justify-between items-center mb-8 border-b pb-4">
                                                                                                                                                                                                                                                                                    <div>
                                                                                                                                                                                                                                                                                                    <h2 class="text-xl font-bold text-slate-800">স্বাগতম, <span id="userName" class="text-indigo-600"></span></h2>
                                                                                                                                                                                                                                                                                                                    <p class="text-xs text-slate-400 font-medium" id="currentDate"></p>
                                                                                                                                                                                                                                                                                                                                </div>
                                                                                                                                                                                                                                                                                                                                            <button onclick="logout()" class="text-xs bg-red-50 text-red-600 px-3 py-2 rounded-full font-bold hover:bg-red-100 transition border border-red-200">লগ আউট</button>
                                                                                                                                                                                                                                                                                                                                                    </div>

                                                                                                                                                                                                                                                                                                                                                            <!-- ADMIN MESSAGE -->
                                                                                                                                                                                                                                                                                                                                                                    <div class="bg-indigo-50 p-4 rounded-xl mb-8 border border-indigo-100 flex items-start space-x-3">
                                                                                                                                                                                                                                                                                                                                                                                <span class="text-xl">📢</span>
                                                                                                                                                                                                                                                                                                                                                                                            <div>
                                                                                                                                                                                                                                                                                                                                                                                                            <p class="text-xs font-bold text-indigo-800 uppercase tracking-tight">অ্যাডমিন মেসেজ</p>
                                                                                                                                                                                                                                                                                                                                                                                                                            <p class="text-slate-700 text-sm mt-1">সবাই আজ সময়মতো রিপোর্ট সাবমিট করবেন। ধন্যবাদ।</p>
                                                                                                                                                                                                                                                                                                                                                                                                                                        </div>
                                                                                                                                                                                                                                                                                                                                                                                                                                                </div>

                                                                                                                                                                                                                                                                                                                                                                                                                                                        <!-- TASK FORM (আইটেম #3: Design Task Form) -->
                                                                                                                                                                                                                                                                                                                                                                                                                                                                <div class="space-y-4">
                                                                                                                                                                                                                                                                                                                                                                                                                                                                            <h3 class="font-bold text-slate-700 mb-2">ডেইলি টাস্ক লিস্ট:</h3>
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                        
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                    <label class="flex items-center space-x-4 bg-slate-50 p-4 rounded-xl border border-slate-100 cursor-pointer hover:bg-slate-100 transition">
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                    <input type="checkbox" class="w-6 h-6 rounded-md accent-indigo-600">
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                    <span class="text-slate-700 font-semibold">Doctor Visit Completed</span>
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                </label>
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                            
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                        <label class="flex items-center space-x-4 bg-slate-50 p-4 rounded-xl border border-slate-100 cursor-pointer hover:bg-slate-100 transition">
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                        <input type="checkbox" class="w-6 h-6 rounded-md accent-indigo-600">
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                        <span class="text-slate-700 font-semibold">Sample Distributed</span>
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                    </label>

                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                <textarea id="note" placeholder="অতিরিক্ত কোনো তথ্য থাকলে এখানে লিখুন..." class="w-full p-4 border border-slate-300 rounded-xl h-24 focus:ring-2 focus:ring-indigo-500 outline-none transition"></textarea>
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                            
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                        <button onclick="submitTask()" id="subBtn" class="w-full bg-emerald-500 text-white p-4 rounded-xl font-bold text-lg hover:bg-emerald-600 active:scale-95 transition-all shadow-md shadow-emerald-100">রিপোর্ট জমা দিন</button>
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                </div>
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                    </div>

                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                        <!-- LOGIC (আইটেম #2: Add User Authentication) -->
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                            <script>
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                    // ইউজার ডাটাবেস
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                            const users = {
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                        "user1": {pass: "101", name: "Abu Taher"},
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                    "user2": {pass: "202", name: "Staff A"},
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                "user3": {pass: "303", name: "Staff B"},
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                            "user4": {pass: "404", name: "Staff C"},
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                        "user5": {pass: "505", name: "Staff D"}
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                };

                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                        function handleLogin() {
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                    const idInput = document.getElementById('uid').value.trim().toLowerCase();
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                const passInput = document.getElementById('pass').value.trim();
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                            const err = document.getElementById('errMsg');

                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                        if (users[idInput] && users[idInput].pass === passInput) {
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                        localStorage.setItem('currentUser', users[idInput].name);
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                        showDashboard();
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                    } else {
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                    err.innerText = "ভুল আইডি বা পাসওয়ার্ড!";
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                }
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                        }

                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                function showDashboard() {
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                            const user = localStorage.getItem('currentUser');
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                        if (user) {
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                        document.getElementById('loginCard').classList.add('hidden');
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                        document.getElementById('dashboard').classList.remove('hidden');
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                        document.getElementById('userName').innerText = user;
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                        document.getElementById('currentDate').innerText = new Date().toLocaleDateString('bn-BD', { weekday: 'long', year: 'numeric', month: 'long', day: 'numeric' });
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                    }
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                            }

                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                    function submitTask() {
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                const btn = document.getElementById('subBtn');
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                            btn.innerText = "প্রসেসিং...";
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                        btn.disabled = true;

                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                    setTimeout(() => {
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                    alert("আপনার রিপোর্ট সফলভাবে জমা হয়েছে!");
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                    btn.innerText = "রিপোর্ট জমা দিন";
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                    btn.disabled = false;
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                    document.getElementById('note').value = "";
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                }, 1000);
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                        }

                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                function logout() {
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                            localStorage.removeItem('currentUser');
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                        location.reload();
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                }

                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                        window.onload = function() {
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                    if(localStorage.getItem('currentUser')) showDashboard();
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                            };
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                </script>
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                </body>
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                </html>
